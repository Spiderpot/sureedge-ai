# SureEdge AI — Production NGINX Configuration
# Fixes:
#   - HTTPS redirect was commented out (running HTTP only)
#   - X-XSS-Protection was deprecated/broken syntax
#   - No DHPARAM (weak DH key exchange)
#   - No OCSP stapling
#   - X-Frame-Options was SAMEORIGIN (should be DENY)
#   - server_tokens not disabled
#   - worker_connections too low

worker_processes  auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Hide NGINX version
  server_tokens off;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 10M;
  types_hash_max_size 4096;

  # Logging
  log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml text/javascript image/svg+xml;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:20m  rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;   # tighter: 3/min
  limit_req_status 429;
  limit_conn_zone $binary_remote_addr zone=perip:10m;

  # SSL shared config
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  ssl_prefer_server_ciphers off;
  ssl_dhparam         /etc/nginx/dhparam.pem;
  ssl_session_tickets off;
  ssl_session_cache   shared:SSL:20m;
  ssl_session_timeout 1d;
  ssl_stapling        on;
  ssl_stapling_verify on;
  resolver 8.8.8.8 8.8.4.4 valid=300s;
  resolver_timeout 5s;

  upstream nextjs {
    server app:3000;
    keepalive 64;
  }

  # ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS main server ─────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sureedge.ai www.sureedge.ai;

    ssl_certificate     /etc/letsencrypt/live/sureedge.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sureedge.ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/sureedge.ai/chain.pem;

    limit_conn perip 30;

    # ─── Security Headers ────────────────────────────────────────────────────
    # REMOVED X-XSS-Protection (deprecated, broken in original)
    add_header Strict-Transport-Security     "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options               "DENY" always;
    add_header X-Content-Type-Options        "nosniff" always;
    add_header Referrer-Policy               "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy       "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; upgrade-insecure-requests;" always;
    add_header Permissions-Policy            "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    proxy_hide_header X-Powered-By;

    # ─── Static assets — aggressive caching ─────────────────────────────────
    location /_next/static/ {
      proxy_pass http://nextjs;
      expires 365d;
      add_header Cache-Control "public, immutable";
    }

    location /public/ {
      proxy_pass http://nextjs;
      expires 7d;
    }

    # ─── Auth — strict rate limit ────────────────────────────────────────────
    location ~ ^/api/auth/(login|register) {
      limit_req zone=auth burst=2 nodelay;
      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 30s;
    }

    # ─── API ─────────────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 60s;
    }

    # ─── WebSocket ───────────────────────────────────────────────────────────
    location /ws/ {
      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 3600s;
    }

    # ─── Block dangerous paths ───────────────────────────────────────────────
    location ~ /\.env { deny all; }
    location ~ /\.git  { deny all; }
    location ~ \.(sql|bak|sh|bash|config)$ { deny all; }
    location ~ /\.      { deny all; access_log off; log_not_found off; }

    # ─── Default ─────────────────────────────────────────────────────────────
    location / {
      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }
  }
}
