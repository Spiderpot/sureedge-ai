# SureEdge AI — Hardened Production Docker Compose
# Fixes:
#   - Removed postgres + redis exposed ports (were accessible from internet)
#   - Redis now has password set
#   - Removed hardcoded DB password
#   - Added network isolation (frontend / backend)
#   - Added security_opt: no-new-privileges
#   - Added Certbot for auto SSL

networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
  backend:
    driver: bridge
    internal: true           # no direct internet access
    ipam:
      config:
        - subnet: 172.28.1.0/24

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:
  nginx_logs:

services:

  # ─── NGINX ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sureedge-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── NEXT.JS APP ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: sureedge-ai:${BUILD_ID:-latest}
    container_name: sureedge-app
    restart: unless-stopped
    expose:
      - "3000"           # NOT published to host — only accessible inside Docker network
    env_file: .env.production
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── POSTGRESQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sureedge-db
    restart: unless-stopped
    expose:
      - "5432"           # NOT published to host — internal only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sureedge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # required — no default
      POSTGRES_DB: ${POSTGRES_DB:-sureedge_prod}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sureedge} -d ${POSTGRES_DB:-sureedge_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ─── REDIS ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sureedge-cache
    restart: unless-stopped
    expose:
      - "6379"           # NOT published to host
    # Fix: password in config file, not CLI args (invisible in ps aux)
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ─── CERTBOT (auto SSL renewal) ───────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: sureedge-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $!;
      done;'
    networks:
      - frontend
