# SureEdge AI — Redis Production Config
# Password substituted at deploy time via scripts/setup-production.sh
bind 0.0.0.0
port 6379
requirepass REDIS_PASSWORD_PLACEHOLDER
maxmemory 512mb
maxmemory-policy allkeys-lru
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000
protected-mode yes
timeout 300
loglevel notice
databases 2
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""
