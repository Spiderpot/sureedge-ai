groups:
  - name: sureedge
    rules:
      - alert: AppDown
        expr: up{job="sureedge_app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SureEdge app is down"

      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Error rate > 1%"

      - alert: DiskLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.15
        for: 5m
        labels:
          severity: warning
