name: SureEdge AI — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Quality Gate ─────────────────────────────────────────────────────────
  quality:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - run: npm run lint
      - run: npx tsc --noEmit

  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image:  ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: BUILD_ID=${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── Security Scan ────────────────────────────────────────────────────────
  scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      security-events: write
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ needs.build.outputs.digest }}
          format:    sarif
          output:    trivy.sarif
          severity:  CRITICAL,HIGH
          exit-code: 1

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url:  https://sureedge.ai
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH with verified host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          echo "${{ secrets.DEPLOY_SSH_KEY }}"     > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Copy updated files
        run: |
          rsync -az --delete \
            --exclude node_modules --exclude .next --exclude '*.tar.gz' \
            -e "ssh -o StrictHostKeyChecking=yes -i ~/.ssh/id_ed25519" \
            . ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/sureedge/

      - name: Deploy
        env:
          DIGEST:   ${{ needs.build.outputs.digest }}
          BUILD_ID: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=yes -i ~/.ssh/id_ed25519 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /opt/sureedge && IMAGE_DIGEST='${DIGEST}' BUILD_ID='${BUILD_ID}' bash scripts/deploy.sh --skip-backup"

      - name: Smoke test
        run: |
          sleep 10
          curl -sf https://sureedge.ai/api/health | grep '"status"'
          curl -sf https://sureedge.ai/api/health/ready

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: '{"text":"✅ SureEdge AI deployed: `${{ github.sha }}` by @${{ github.actor }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: '{"text":"🚨 SureEdge AI deploy FAILED: `${{ github.sha }}` — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
